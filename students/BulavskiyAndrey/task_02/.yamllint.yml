---
extends: default
rules:
  line-length: disable
  comments: disable
  indentation: disable
  braces: disable
  brackets: disable
  colons: disable
  commas: disable
  comments-indentation: disable
  document-start: disable
  empty-lines: disable
  hyphens: disable
  key-duplicates: disable
  key-ordering: disable
  new-line-at-end-of-file: disable
  new-lines: disable
  octal-values: disable
  quoted-strings: disable
  trailing-spaces: disable
  truthy: disable
