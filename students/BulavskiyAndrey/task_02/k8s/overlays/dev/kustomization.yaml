---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: app-dev
resources:
  - ../../base
patches:
  - path: patches/ingress-host.yaml
  - path: patches/config-overrides.yaml
  - path: patches/server-replicas.yaml
  - path: patches/web-replicas.yaml
namePrefix: dev-
commonLabels:
  environment: development
