services:
  db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USERNAME:-postgres} -d ${POSTGRES_DB:-postgres} -h localhost",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-postgres}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_USER_PASSWORD=${POSTGRES_USER_PASSWORD:-1111}
    restart: on-failure

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - server
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://server:8080
    restart: on-failure

volumes:
  db-data:
