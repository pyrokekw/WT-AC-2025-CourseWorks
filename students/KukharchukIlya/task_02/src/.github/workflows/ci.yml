name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run tests
        working-directory: ./src/apps/backend
        run: mvn test
      - name: Build
        working-directory: ./src/apps/backend
        run: mvn package -DskipTests

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: ./src/apps/frontend
        run: npm install
      - name: Run linter
        working-directory: ./src/apps/frontend
        run: npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint]
    steps:
      - uses: actions/checkout@v3
      - name: Build backend image
        working-directory: ./src/apps/backend
        run: docker build -t microshop-backend:latest .
      - name: Build frontend image
        working-directory: ./src/apps/frontend
        run: docker build -t microshop-frontend:latest .
