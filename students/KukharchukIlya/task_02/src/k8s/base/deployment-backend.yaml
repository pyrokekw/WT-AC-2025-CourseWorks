apiVersion: apps/v1
kind: Deployment
metadata:
  name: microshop-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: microshop-backend
  template:
    metadata:
      labels:
        app: microshop-backend
    spec:
      containers:
      - name: backend
        image: microshop-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: microshop-config
              key: db.host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: microshop-config
              key: db.port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: microshop-config
              key: db.name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: microshop-secrets
              key: db.user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: microshop-secrets
              key: db.password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: microshop-config
              key: redis.host
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: microshop-secrets
              key: jwt.secret
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
