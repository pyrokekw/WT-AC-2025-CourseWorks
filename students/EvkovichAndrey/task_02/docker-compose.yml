# docker-compose.yml
version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: habit-tracker-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ./mongodb_backup:/backup
    networks:
      - habit-network
    command: mongod --auth

  server:
    build: .
    container_name: habit-tracker-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/habit-tracker?authSource=admin
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production_12345
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://localhost:3000
      - ADMIN_EMAIL=admin@ht.com
      - ADMIN_PASSWORD=admin123
      - ADMIN_USERNAME=admin
      - CREATE_TEST_DATA=${CREATE_TEST_DATA:-false}
    depends_on:
      - mongodb
    networks:
      - habit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    build: ./client
    container_name: habit-tracker-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - habit-network

  # Опционально: phpMyAdmin для просмотра MongoDB (через mongo-express)
  mongo-express:
    image: mongo-express
    container_name: habit-tracker-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - habit-network

volumes:
  mongodb_data:
    driver: local

networks:
  habit-network:
    driver: bridge